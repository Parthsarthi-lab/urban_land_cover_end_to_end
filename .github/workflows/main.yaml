name: FastAPI CI Pipeline

# 1. When should this robot wake up?
on:
  push:
    branches:
      - main

# 2. What should it do?
jobs:
  test-api:
    runs-on: ubuntu-latest  # Spin up a fresh Linux server

    steps:
      # Step A: Download your code from GitHub onto the server
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step B: Install Python
      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      # Step C: Install dependencies (including testing tools)
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      # Step D: Run the test we wrote earlier
      - name: Run Pytest
        run: |
          pytest tests/test_app.py